name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: test_db
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      
      clickhouse:
        image: clickhouse/clickhouse-server:23.8
        ports:
          - 8123:8123
          - 9000:9000
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/dev.txt
        pip install pytest pytest-cov flake8 black isort
    
    - name: Lint with flake8
      working-directory: ./backend
      run: |
        flake8 apps --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 apps --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check formatting with black
      working-directory: ./backend
      run: |
        black --check apps config core
    
    - name: Check imports with isort
      working-directory: ./backend
      run: |
        isort --check-only --profile black apps config core
    
    - name: Run migrations
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
        DJANGO_SETTINGS_MODULE: config.settings.test
      run: |
        python manage.py migrate
    
    - name: Run backend tests with coverage
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
        MYSQL_TEST_URL: mysql://root:rootpass@localhost:3306/test_db
        MONGODB_TEST_URL: mongodb://localhost:27017/test_db
        CLICKHOUSE_TEST_URL: http://localhost:8123
        DJANGO_SETTINGS_MODULE: config.settings.test
      run: |
        pytest --cov=apps --cov=config --cov=core --cov-report=xml --cov-report=html
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        fail_ci_if_error: false

  frontend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
    
    - name: Install dependencies
      working-directory: ./frontend
      run: |
        npm ci
    
    - name: Lint with ESLint
      working-directory: ./frontend
      run: |
        npm run lint
    
    - name: Type check with TypeScript
      working-directory: ./frontend
      run: |
        npm run type-check
    
    - name: Run tests with Jest
      working-directory: ./frontend
      run: |
        npm test -- --coverage --watchAll=false
    
    - name: Build Next.js application
      working-directory: ./frontend
      run: |
        npm run build

  e2e-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Start services with Docker Compose
      run: |
        docker-compose -f docker-compose.yml up -d --build
    
    - name: Wait for services to be ready
      run: |
        sleep 30
    
    - name: Run migrations
      run: |
        docker-compose exec -T backend python manage.py migrate
    
    - name: Seed test data
      run: |
        docker-compose exec -T backend python manage.py seed_data --test
    
    - name: Run Cypress E2E tests
      uses: cypress-io/github-action@v5
      with:
        working-directory: ./frontend
        start: npm run dev
        wait-on: 'http://localhost:3000'
        browser: chrome
    
    - name: Upload E2E screenshots
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: e2e-screenshots
        path: ./frontend/cypress/screenshots
    
    - name: Stop services
      if: always()
      run: |
        docker-compose down

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Bandit security scan
      working-directory: ./backend
      run: |
        pip install bandit
        bandit -r apps -f json -o bandit-report.json
    
    - name: Run npm audit
      working-directory: ./frontend
      run: |
        npm audit --audit-level=moderate
    
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          ./backend/bandit-report.json

  build-and-push:
    needs: [backend-tests, frontend-tests, e2e-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/data-connector-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/data-connector-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/data-connector-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/data-connector-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max